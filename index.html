<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cricket Scoreboard – Gully Cricket</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green-dark: #0d3b1e;
    --green-mid: #1a6b35;
    --green-bright: #28a745;
    --gold: #f0c040;
    --gold-dark: #c89a10;
    --red: #e63946;
    --blue: #1d7fd4;
    --purple: #7c3aed;
    --amber: #d97706;
    --bg: #0a1f10;
    --bg2: #0f2b17;
    --bg3: #142e1a;
    --surface: #192f20;
    --surface2: #1e3826;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8f5ec;
    --text2: #9dbfa8;
    --text3: #5a8568;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Bebas Neue', cursive;
    --body: 'Rajdhani', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    font-size: 15px;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(40,167,69,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(240,192,64,0.08) 0%, transparent 50%);
  }

  /* ── HEADER ── */
  .site-header {
    background: linear-gradient(135deg, var(--green-dark), #0a2a12);
    border-bottom: 2px solid var(--gold);
    padding: 14px 20px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { font-size: 28px; }
  .logo-text { font-family: var(--display); font-size: 26px; letter-spacing: 2px; color: var(--gold); line-height: 1; }
  .logo-sub { font-size: 11px; color: var(--text3); letter-spacing: 3px; text-transform: uppercase; }
  .live-badge { background: var(--red); color: #fff; font-family: var(--mono); font-size: 11px; padding: 4px 10px; border-radius: 3px; letter-spacing: 1px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

  /* ── LAYOUT ── */
  .container { max-width: 780px; margin: 0 auto; padding: 20px 16px; }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .card-title {
    font-family: var(--display);
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--gold);
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title::after { content:''; flex:1; height:1px; background:var(--border2); }

  /* ── SETUP ── */
  .form-group { margin-bottom: 14px; }
  label { font-size: 12px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; display: block; margin-bottom: 5px; }
  input, select {
    width: 100%; padding: 10px 12px;
    background: var(--bg2); color: var(--text);
    border: 1px solid var(--border2); border-radius: 8px;
    font-family: var(--body); font-size: 15px;
    transition: border-color 0.2s;
  }
  input:focus, select:focus { outline: none; border-color: var(--green-bright); }
  select option { background: #0f2b17; }

  .players-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .player-row { display: flex; align-items: center; gap: 8px; }
  .player-num { font-family: var(--mono); font-size: 12px; color: var(--text3); min-width: 20px; }

  .teams-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width:600px) { .teams-grid { grid-template-columns: 1fr; } .players-grid { grid-template-columns: 1fr; } }

  .start-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--green-mid), var(--green-bright));
    color: #fff; border: none; border-radius: 10px;
    font-family: var(--display); font-size: 22px; letter-spacing: 3px;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 20px rgba(40,167,69,0.4);
    margin-top: 8px;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(40,167,69,0.5); }

  /* ── INNINGS TABS ── */
  .inn-tabs { display: flex; gap: 0; border-radius: 10px; overflow: hidden; border: 1px solid var(--border2); margin-bottom: 16px; }
  .inn-tab { flex: 1; padding: 10px; text-align: center; font-family: var(--display); font-size: 16px; letter-spacing: 2px; cursor: pointer; background: var(--bg2); color: var(--text3); border: none; transition: all 0.2s; }
  .inn-tab.active { background: var(--green-mid); color: #fff; }

  /* ── SCOREBOARD ── */
  .score-banner {
    background: linear-gradient(135deg, var(--green-dark), var(--bg3));
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .score-banner::before {
    content: '';
    position: absolute; top: -20px; right: -20px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(240,192,64,0.1), transparent);
  }
  .batting-team-label { font-size: 12px; letter-spacing: 3px; color: var(--text3); text-transform: uppercase; margin-bottom: 4px; }
  .main-score { font-family: var(--display); font-size: 56px; color: var(--gold); line-height: 1; letter-spacing: 2px; }
  .main-score span { font-size: 32px; color: var(--text2); }
  .score-meta { display: flex; gap: 20px; margin-top: 8px; flex-wrap: wrap; }
  .score-meta-item { font-family: var(--mono); font-size: 13px; color: var(--text2); }
  .score-meta-item strong { color: var(--text); }

  /* Target bar */
  .target-bar { margin-top: 10px; }
  .target-label { font-size: 12px; color: var(--text3); margin-bottom: 4px; }
  .target-progress { height: 6px; background: var(--bg2); border-radius: 3px; overflow: hidden; }
  .target-fill { height: 100%; background: linear-gradient(90deg, var(--green-bright), var(--gold)); border-radius: 3px; transition: width 0.4s; }

  /* ── BATTERS ROW ── */
  .batters-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .batter-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    position: relative;
  }
  .batter-box.striker { border-color: var(--gold); }
  .striker-mark {
    position: absolute; top: 8px; right: 10px;
    width: 8px; height: 8px; border-radius: 50%; background: var(--gold);
    box-shadow: 0 0 8px var(--gold);
  }
  .batter-name { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .batter-stats { font-family: var(--mono); font-size: 12px; color: var(--text2); }
  .batter-role { font-size: 10px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-bottom: 4px; }

  .bowler-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
  }
  .bowler-icon { font-size: 20px; }
  .bowler-info { flex: 1; }
  .bowler-name { font-size: 15px; font-weight: 600; color: var(--text); }
  .bowler-figures { font-family: var(--mono); font-size: 13px; color: var(--text2); }

  /* ── OVER BALLS ── */
  .over-balls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }
  .over-label { font-size: 11px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; margin-right: 4px; }
  .ball {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 12px; font-weight: bold;
    background: var(--surface2); color: var(--text2);
    border: 1px solid var(--border2);
    transition: transform 0.15s;
  }
  .ball.four { background: rgba(29,127,212,0.2); border-color: var(--blue); color: #7ec8ff; }
  .ball.six { background: rgba(40,167,69,0.2); border-color: var(--green-bright); color: #7fffaa; }
  .ball.w { background: rgba(230,57,70,0.2); border-color: var(--red); color: #ff8a8a; }
  .ball.wd { background: rgba(217,119,6,0.2); border-color: var(--amber); color: #fcd68a; }
  .ball.nb { background: rgba(124,58,237,0.2); border-color: var(--purple); color: #c4b5fd; }

  /* ── BUTTONS ── */
  .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .run-btn {
    padding: 10px 16px; border-radius: 8px;
    font-family: var(--display); font-size: 18px; letter-spacing: 1px;
    cursor: pointer; border: 1px solid var(--border2);
    background: var(--surface2); color: var(--text);
    transition: all 0.15s;
    min-width: 52px; text-align: center;
  }
  .run-btn:hover { transform: translateY(-2px); background: var(--surface); }
  .run-btn:active { transform: scale(0.96); }
  .run-btn.four { border-color: var(--blue); color: #7ec8ff; background: rgba(29,127,212,0.1); }
  .run-btn.six { border-color: var(--green-bright); color: #7fffaa; background: rgba(40,167,69,0.1); }
  .run-btn.wide { border-color: var(--amber); color: #fcd68a; background: rgba(217,119,6,0.1); }
  .run-btn.nb { border-color: var(--purple); color: #c4b5fd; background: rgba(124,58,237,0.1); }
  .run-btn.wicket { border-color: var(--red); color: #ff8a8a; background: rgba(230,57,70,0.1); font-size: 14px; }
  .undo-btn {
    padding: 8px 14px; border-radius: 8px;
    font-family: var(--mono); font-size: 12px;
    cursor: pointer; border: 1px solid var(--border2);
    background: transparent; color: var(--text3);
    transition: all 0.15s; margin-left: auto;
  }
  .undo-btn:hover { color: var(--text); border-color: var(--text3); }

  .controls-header { display: flex; align-items: center; margin-bottom: 8px; }
  .controls-label { font-size: 11px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; }

  /* ── TABS ── */
  .tabs { display: flex; gap: 0; border-radius: 10px; overflow: hidden; border: 1px solid var(--border2); margin-bottom: 14px; }
  .tab-btn { flex: 1; padding: 9px; text-align: center; font-family: var(--display); font-size: 15px; letter-spacing: 1px; cursor: pointer; background: var(--bg2); color: var(--text3); border: none; transition: all 0.2s; }
  .tab-btn.active { background: var(--surface2); color: var(--gold); }

  /* ── TABLE ── */
  .score-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .score-table th { font-size: 11px; letter-spacing: 2px; color: var(--text3); text-transform: uppercase; padding: 6px 8px; border-bottom: 1px solid var(--border2); text-align: left; }
  .score-table th:not(:first-child) { text-align: center; }
  .score-table td { padding: 8px 8px; border-bottom: 1px solid var(--border); color: var(--text); }
  .score-table td:not(:first-child) { text-align: center; font-family: var(--mono); font-size: 13px; }
  .score-table tr:last-child td { border-bottom: none; }
  .score-table tr.out-row td:first-child { color: var(--text3); text-decoration: line-through; }
  .score-table tr.active-row td:first-child { color: var(--gold); font-weight: 600; }

  /* ── PLAYER SELECT ── */
  .select-modal {
    background: var(--surface);
    border: 1px solid var(--gold);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 16px;
  }
  .select-modal h3 { font-family: var(--display); font-size: 18px; letter-spacing: 2px; color: var(--gold); margin-bottom: 12px; }
  .player-opts { display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
  .player-opt-btn {
    padding: 10px 14px; border-radius: 8px;
    border: 1px solid var(--border2); background: var(--surface2);
    color: var(--text); font-family: var(--body); font-size: 15px;
    cursor: pointer; text-align: left; transition: all 0.15s;
  }
  .player-opt-btn:hover { border-color: var(--green-bright); color: var(--gold); background: rgba(40,167,69,0.1); }

  /* ── RESULT ── */
  .result-card {
    background: linear-gradient(135deg, rgba(240,192,64,0.1), rgba(40,167,69,0.15));
    border: 2px solid var(--gold);
    border-radius: 14px;
    padding: 24px;
    text-align: center;
    margin-bottom: 16px;
  }
  .result-trophy { font-size: 48px; margin-bottom: 10px; }
  .result-title { font-family: var(--display); font-size: 36px; color: var(--gold); letter-spacing: 3px; margin-bottom: 8px; }
  .result-desc { font-size: 16px; color: var(--text2); }

  /* ── OVER HISTORY ── */
  .over-hist-item { margin-bottom: 14px; }
  .over-hist-label { font-size: 11px; letter-spacing: 2px; color: var(--text3); margin-bottom: 6px; }
  .over-hist-balls { display: flex; gap: 6px; flex-wrap: wrap; }
  .over-hist-total { font-family: var(--mono); font-size: 12px; color: var(--text2); margin-left: auto; display: flex; align-items: center; }

  /* ── STATUS MSG ── */
  .status-msg {
    text-align: center; font-size: 14px; color: var(--text2);
    padding: 14px; background: var(--surface2); border-radius: 10px;
    font-family: var(--mono); letter-spacing: 1px;
    margin-bottom: 14px; border: 1px solid var(--border);
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--green-mid); border-radius: 3px; }
</style>
</head>
<body>

<header class="site-header">
  <div class="logo">
    <span class="logo-icon">🏏</span>
    <div>
      <div class="logo-text">Cricket Scoreboard</div>
      <div class="logo-sub">Gully Cricket · All Player Access</div>
    </div>
  </div>
  <div class="live-badge" id="liveBadge">SETUP</div>
</header>

<div class="container">

  <!-- SETUP VIEW -->
  <div id="setupView">
    <div class="card">
      <div class="card-title">Match Details</div>
      <div class="form-group">
        <label>Match Name / Ground</label>
        <input id="matchName" type="text" value="Gully Cricket Match" placeholder="e.g. Colony Ground Final">
      </div>
      <div class="form-group">
        <label>Overs Per Innings</label>
        <select id="totalOvers">
          <option value="5">5 Overs</option>
          <option value="6">6 Overs</option>
          <option value="8">8 Overs</option>
          <option value="10" selected>10 Overs</option>
          <option value="15">15 Overs</option>
          <option value="20">20 Overs</option>
        </select>
      </div>
    </div>

    <div class="teams-grid">
      <div class="card">
        <div class="card-title">Team 1</div>
        <div class="form-group">
          <label>Team Name</label>
          <input id="team1name" type="text" value="Team A" placeholder="Team 1 Name">
        </div>
        <label>Players (11)</label>
        <div class="players-grid" id="team1players"></div>
      </div>
      <div class="card">
        <div class="card-title">Team 2</div>
        <div class="form-group">
          <label>Team Name</label>
          <input id="team2name" type="text" value="Team B" placeholder="Team 2 Name">
        </div>
        <label>Players (11)</label>
        <div class="players-grid" id="team2players"></div>
      </div>
    </div>

    <button class="start-btn" onclick="startMatch()">🏏 START MATCH</button>
  </div>

  <!-- MATCH VIEW -->
  <div id="matchView" style="display:none;">

    <div class="inn-tabs">
      <button class="inn-tab active" id="inn1Tab" onclick="viewInnings(0)">1st Innings</button>
      <button class="inn-tab" id="inn2Tab" onclick="viewInnings(1)">2nd Innings</button>
    </div>

    <div id="resultCard" style="display:none;" class="result-card">
      <div class="result-trophy">🏆</div>
      <div class="result-title" id="resultTitle">-</div>
      <div class="result-desc" id="resultDesc">-</div>
    </div>

    <div class="score-banner" id="scoreBanner">
      <div class="batting-team-label" id="battingTeamLabel">Team batting</div>
      <div class="main-score" id="mainScore">0<span>/0</span></div>
      <div class="score-meta">
        <div class="score-meta-item"><strong id="oversDisplay">0.0</strong> / <span id="totalOversDisplay">0</span> overs</div>
        <div class="score-meta-item">RR: <strong id="rrDisplay">0.00</strong></div>
        <div class="score-meta-item" id="extrasDisplay">Extras: 0</div>
        <div class="score-meta-item" id="targetDisplay" style="display:none;color:#f0c040;"></div>
      </div>
      <div class="target-bar" id="targetBar" style="display:none;">
        <div class="target-label" id="targetLabel">-</div>
        <div class="target-progress"><div class="target-fill" id="targetFill" style="width:0%"></div></div>
      </div>
    </div>

    <div class="batters-row">
      <div class="batter-box striker" id="strikerBox">
        <div class="striker-mark"></div>
        <div class="batter-role">Striker</div>
        <div class="batter-name" id="strikerName">-</div>
        <div class="batter-stats" id="strikerStats">0 (0b)</div>
      </div>
      <div class="batter-box" id="nonStrikerBox">
        <div class="batter-role">Non-Striker</div>
        <div class="batter-name" id="nonStrikerName">-</div>
        <div class="batter-stats" id="nonStrikerStats">0 (0b)</div>
      </div>
    </div>

    <div class="bowler-box">
      <div class="bowler-icon">🎳</div>
      <div class="bowler-info">
        <div class="bowler-name" id="bowlerName">-</div>
        <div class="bowler-figures" id="bowlerFigures">0-0 (0.0)</div>
      </div>
    </div>

    <!-- SELECT BOWLER -->
    <div id="selectBowlerView" style="display:none;" class="select-modal">
      <h3>Select Bowler</h3>
      <div class="player-opts" id="bowlerList"></div>
    </div>

    <!-- SELECT BATTER -->
    <div id="selectBatterView" style="display:none;" class="select-modal">
      <h3 id="batterModalTitle">Select Batter</h3>
      <div class="player-opts" id="batterList"></div>
    </div>

    <div id="liveControls">
      <div class="over-balls" id="overBalls">
        <span class="over-label">This Over:</span>
      </div>

      <div class="controls-header">
        <span class="controls-label">Add Ball</span>
        <button class="undo-btn" onclick="undoLastBall()">↩ Undo</button>
      </div>
      <div class="controls">
        <button class="run-btn" onclick="addBall(0)">•</button>
        <button class="run-btn" onclick="addBall(1)">1</button>
        <button class="run-btn" onclick="addBall(2)">2</button>
        <button class="run-btn" onclick="addBall(3)">3</button>
        <button class="run-btn four" onclick="addBall(4)">4</button>
        <button class="run-btn six" onclick="addBall(6)">6</button>
        <button class="run-btn wide" onclick="addExtra('wide')">Wide</button>
        <button class="run-btn nb" onclick="addExtra('nb')">No Ball</button>
        <button class="run-btn wicket" onclick="addWicket()">⚡ Wicket</button>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('batTab',this)">Batting</button>
      <button class="tab-btn" onclick="showTab('bowlTab',this)">Bowling</button>
      <button class="tab-btn" onclick="showTab('overHistTab',this)">Overs</button>
    </div>

    <div id="batTab">
      <table class="score-table">
        <thead><tr><th>Batter</th><th>R</th><th>B</th><th>4s</th><th>6s</th><th>SR</th></tr></thead>
        <tbody id="batTable"></tbody>
      </table>
    </div>
    <div id="bowlTab" style="display:none;">
      <table class="score-table">
        <thead><tr><th>Bowler</th><th>O</th><th>M</th><th>R</th><th>W</th><th>Eco</th></tr></thead>
        <tbody id="bowlTable"></tbody>
      </table>
    </div>
    <div id="overHistTab" style="display:none;">
      <div id="overHistory"></div>
    </div>

  </div>
</div>

<script>
let match = null;
let viewingInnings = 0;

function renderSetupPlayers() {
  ['team1','team2'].forEach((t,ti) => {
    const c = document.getElementById(t+'players');
    c.innerHTML = '';
    for(let i=0;i<11;i++) {
      const d = document.createElement('div');
      d.className = 'player-row';
      d.innerHTML = `<span class="player-num">${i+1}</span><input type="text" placeholder="Player ${i+1}" value="Player ${i+1}" id="${t}p${i}" style="padding:6px 10px;font-size:13px;">`;
      c.appendChild(d);
    }
  });
}

function startMatch() {
  const t1name = document.getElementById('team1name').value || 'Team A';
  const t2name = document.getElementById('team2name').value || 'Team B';
  const overs = parseInt(document.getElementById('totalOvers').value);
  const matchName = document.getElementById('matchName').value;
  const t1players = Array.from({length:11},(_,i)=>document.getElementById('team1p'+i).value||'Player '+(i+1));
  const t2players = Array.from({length:11},(_,i)=>document.getElementById('team2p'+i).value||'Player '+(i+1));

  match = {
    matchName, overs,
    teams: [
      { name: t1name, players: t1players },
      { name: t2name, players: t2players }
    ],
    innings: [createInnings(0, overs), createInnings(1, overs)],
    currentInnings: 0,
    inningsComplete: [false, false]
  };

  document.getElementById('setupView').style.display='none';
  document.getElementById('matchView').style.display='block';
  document.getElementById('liveBadge').textContent = '1ST INN';
  document.getElementById('totalOversDisplay').textContent = overs;
  viewingInnings = 0;

  selectOpenersAndBowler();
}

function createInnings(battingTeamIdx, overs) {
  return {
    battingTeam: battingTeamIdx,
    bowlingTeam: 1 - battingTeamIdx,
    runs: 0, wickets: 0, balls: 0, overs,
    extras: {wide:0, nb:0},
    batters: {}, bowlers: {},
    currentStriker: null, currentNonStriker: null, currentBowler: null,
    overHistory: [], currentOverBalls: [], history: []
  };
}

function selectOpenersAndBowler() {
  const inn = match.innings[match.currentInnings];
  const bt = match.teams[inn.battingTeam];
  showSelectBatter('Select Opener 1', bt.players, (p) => {
    inn.currentStriker = p;
    inn.batters[p] = {runs:0,balls:0,fours:0,sixes:0,out:false};
    showSelectBatter('Select Opener 2', bt.players.filter(x=>x!==p), (p2) => {
      inn.currentNonStriker = p2;
      inn.batters[p2] = {runs:0,balls:0,fours:0,sixes:0,out:false};
      askBowler();
    });
  });
}

function showSelectBatter(title, players, cb) {
  const v = document.getElementById('selectBatterView');
  v.style.display='block';
  document.getElementById('liveControls').style.display='none';
  document.getElementById('batterModalTitle').textContent = title;
  const list = document.getElementById('batterList');
  list.innerHTML = '';
  players.forEach(p => {
    const btn = document.createElement('button');
    btn.className = 'player-opt-btn';
    btn.textContent = p;
    btn.onclick = () => {
      v.style.display='none';
      document.getElementById('liveControls').style.display='block';
      cb(p);
      updateUI();
    };
    list.appendChild(btn);
  });
}

function askBowler() {
  const inn = match.innings[match.currentInnings];
  const bt = match.teams[inn.bowlingTeam];
  const v = document.getElementById('selectBowlerView');
  v.style.display='block';
  document.getElementById('liveControls').style.display='none';
  const list = document.getElementById('bowlerList');
  list.innerHTML = '';
  bt.players.forEach(p => {
    const b = inn.bowlers[p];
    const btn = document.createElement('button');
    btn.className = 'player-opt-btn';
    btn.textContent = p + (b ? ` — ${b.overs}.${b.balls}ov ${b.wickets}/${b.runs}` : '');
    btn.onclick = () => {
      inn.currentBowler = p;
      if(!inn.bowlers[p]) inn.bowlers[p]={overs:0,balls:0,runs:0,wickets:0};
      v.style.display='none';
      document.getElementById('liveControls').style.display='block';
      updateUI();
    };
    list.appendChild(btn);
  });
}

function getCurr() { return match.innings[match.currentInnings]; }

function saveHistory() {
  const inn = getCurr();
  inn.history.push(JSON.parse(JSON.stringify({
    runs:inn.runs, wickets:inn.wickets, balls:inn.balls,
    extras:{...inn.extras},
    batters:JSON.parse(JSON.stringify(inn.batters)),
    bowlers:JSON.parse(JSON.stringify(inn.bowlers)),
    currentStriker:inn.currentStriker, currentNonStriker:inn.currentNonStriker,
    currentBowler:inn.currentBowler,
    overHistory:JSON.parse(JSON.stringify(inn.overHistory)),
    currentOverBalls:[...inn.currentOverBalls]
  })));
}

function addBall(runs) {
  if(match.inningsComplete[match.currentInnings]) return;
  const inn = getCurr();
  saveHistory();

  inn.runs += runs; inn.balls++;
  const s = inn.batters[inn.currentStriker];
  s.runs += runs; s.balls++;
  if(runs===4) s.fours++;
  if(runs===6) s.sixes++;

  const bw = inn.bowlers[inn.currentBowler];
  bw.runs += runs; bw.balls++;

  let label = runs===0?'•':String(runs), cls='';
  if(runs===4){label='4';cls='four';} if(runs===6){label='6';cls='six';}
  inn.currentOverBalls.push({label,cls});
  if(runs%2===1) swap(inn);

  checkOver(inn);
  checkInningsEnd(inn);
  updateUI();
}

function addExtra(type) {
  if(match.inningsComplete[match.currentInnings]) return;
  const inn = getCurr();
  saveHistory();
  inn.runs++; inn.extras[type]++;
  inn.bowlers[inn.currentBowler].runs++;
  inn.currentOverBalls.push({label:type==='wide'?'Wd':'Nb', cls:type==='wide'?'wd':'nb'});
  checkInningsEnd(inn);
  updateUI();
}

function addWicket() {
  if(match.inningsComplete[match.currentInnings]) return;
  const inn = getCurr();
  saveHistory();
  inn.wickets++; inn.balls++;
  const s = inn.batters[inn.currentStriker];
  s.balls++; s.out=true;
  const bw = inn.bowlers[inn.currentBowler];
  bw.balls++; bw.wickets++;
  inn.currentOverBalls.push({label:'W',cls:'w'});
  checkOver(inn);

  if(inn.wickets>=10){checkInningsEnd(inn);return;}
  const used = Object.keys(inn.batters);
  const avail = match.teams[inn.battingTeam].players.filter(p=>!used.includes(p));
  if(!avail.length){checkInningsEnd(inn);return;}
  updateUI();
  showSelectBatter('New Batter In', avail, (p)=>{
    inn.currentStriker=p;
    inn.batters[p]={runs:0,balls:0,fours:0,sixes:0,out:false};
    updateUI();
  });
}

function swap(inn) {
  [inn.currentStriker,inn.currentNonStriker]=[inn.currentNonStriker,inn.currentStriker];
}

function checkOver(inn) {
  const bw = inn.bowlers[inn.currentBowler];
  if(bw.balls>=6) {
    bw.overs++; bw.balls=0;
    inn.overHistory.push([...inn.currentOverBalls]);
    inn.currentOverBalls=[];
    swap(inn);
    if(!match.inningsComplete[match.currentInnings]) setTimeout(()=>askBowler(),200);
  }
}

function checkInningsEnd(inn) {
  const maxBalls = inn.overs*6;
  const chased = match.currentInnings===1 && inn.runs > match.innings[0].runs;
  if(inn.balls>=maxBalls || inn.wickets>=10 || chased) {
    match.inningsComplete[match.currentInnings]=true;
    document.getElementById('liveControls').style.display='none';
    document.getElementById('selectBowlerView').style.display='none';
    document.getElementById('selectBatterView').style.display='none';
    if(match.currentInnings===0) {
      document.getElementById('liveBadge').textContent='2ND INN';
      match.currentInnings=1; viewingInnings=1;
      document.getElementById('inn1Tab').classList.remove('active');
      document.getElementById('inn2Tab').classList.add('active');
      document.getElementById('totalOversDisplay').textContent=inn.overs;
      setTimeout(()=>selectOpenersAndBowler(),300);
    } else { showResult(); }
  }
}

function showResult() {
  const i1=match.innings[0], i2=match.innings[1];
  const t1=match.teams[i1.battingTeam].name, t2=match.teams[i2.battingTeam].name;
  let title, desc;
  if(i2.runs>i1.runs){
    title=t2+' WINS!';
    desc=`${t2} won by ${10-i2.wickets} wickets · ${i2.runs}/${i2.wickets} vs ${i1.runs}/${i1.wickets}`;
  } else if(i1.runs>i2.runs){
    title=t1+' WINS!';
    desc=`${t1} won by ${i1.runs-i2.runs} runs · ${i1.runs}/${i1.wickets} vs ${i2.runs}/${i2.wickets}`;
  } else { title='MATCH TIED!'; desc=`Both teams scored ${i1.runs} runs`; }
  document.getElementById('resultCard').style.display='block';
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultDesc').textContent=desc;
  document.getElementById('liveBadge').textContent='FIN';
}

function undoLastBall() {
  const inn = getCurr();
  if(!inn.history.length) return;
  const prev = inn.history.pop();
  const h = inn.history;
  Object.assign(match.innings[match.currentInnings], prev, {history:h});
  updateUI();
}

function viewInnings(idx) {
  viewingInnings=idx;
  document.getElementById('inn1Tab').classList.toggle('active',idx===0);
  document.getElementById('inn2Tab').classList.toggle('active',idx===1);
  updateUI();
}

function showTab(id, btn) {
  ['batTab','bowlTab','overHistTab'].forEach(t=>document.getElementById(t).style.display='none');
  document.getElementById(id).style.display='block';
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
}
function calcRR(runs,balls) { return balls ? ((runs/balls)*6).toFixed(2) : '0.00'; }

function updateUI() {
  const inn = match.innings[viewingInnings];
  const actInn = getCurr();
  const lo=Math.floor(inn.balls/6), rem=inn.balls%6;

  document.getElementById('battingTeamLabel').textContent=match.teams[inn.battingTeam].name+' batting';
  document.getElementById('mainScore').innerHTML=`${inn.runs}<span>/${inn.wickets}</span>`;
  document.getElementById('oversDisplay').textContent=`${lo}.${rem}`;
  document.getElementById('totalOversDisplay').textContent=inn.overs;
  document.getElementById('rrDisplay').textContent=calcRR(inn.runs,inn.balls);
  document.getElementById('extrasDisplay').textContent=`Extras: ${inn.extras.wide+inn.extras.nb} (wd:${inn.extras.wide} nb:${inn.extras.nb})`;

  if(match.currentInnings===1 && !match.inningsComplete[1]) {
    const target=match.innings[0].runs+1;
    const need=target-actInn.runs;
    const bl=(actInn.overs*6)-actInn.balls;
    document.getElementById('targetDisplay').style.display='block';
    document.getElementById('targetDisplay').textContent=`Need: ${need} off ${bl} balls`;
    document.getElementById('targetBar').style.display='block';
    document.getElementById('targetLabel').textContent=`Target: ${target} | ${need} needed from ${bl} balls`;
    const pct=Math.min(100,Math.round((actInn.runs/match.innings[0].runs)*100));
    document.getElementById('targetFill').style.width=pct+'%';
  } else {
    document.getElementById('targetDisplay').style.display='none';
    document.getElementById('targetBar').style.display='none';
  }
  if(inn.currentStriker){
    const s=inn.batters[inn.currentStriker];
    document.getElementById('strikerName').textContent=inn.currentStriker;
    document.getElementById('strikerStats').textContent=`${s.runs} (${s.balls}b) · 4s:${s.fours} 6s:${s.sixes}`;
  }
  if(inn.currentNonStriker){
    const s=inn.batters[inn.currentNonStriker];
    document.getElementById('nonStrikerName').textContent=inn.currentNonStriker;
    document.getElementById('nonStrikerStats').textContent=`${s.runs} (${s.balls}b) · 4s:${s.fours} 6s:${s.sixes}`;
  }
  if(inn.currentBowler){
    const b=inn.bowlers[inn.currentBowler];
    document.getElementById('bowlerName').textContent=inn.currentBowler;
    document.getElementById('bowlerFigures').textContent=`${b.wickets}-${b.runs} (${b.overs}.${b.balls})`;
  }
  // Over balls
  const ob=document.getElementById('overBalls');
  ob.innerHTML='<span class="over-label">This Over:</span>';
  inn.currentOverBalls.forEach(ball=>{
    const d=document.createElement('div');
    d.className='ball'+(ball.cls?' '+ball.cls:'');
    d.textContent=ball.label;
    ob.appendChild(d);
  });

  // Batting table
  const bt=document.getElementById('batTable');
  bt.innerHTML='';
  Object.entries(inn.batters).forEach(([name,b])=>{
    const sr=b.balls?((b.runs/b.balls)*100).toFixed(0):'0';
    const tr=document.createElement('tr');
    const isStriker=name===inn.currentStriker||name===inn.currentNonStriker;
    tr.className=b.out?'out-row':(isStriker?'active-row':'');
    tr.innerHTML=`<td>${name}${!b.out&&isStriker?'*':''}</td><td>${b.runs}</td><td>${b.balls}</td><td>${b.fours}</td><td>${b.sixes}</td><td>${sr}</td>`;
    bt.appendChild(tr);
  });
  const ext=document.createElement('tr');
  ext.innerHTML=`<td style="color:var(--text3)">Extras</td><td colspan="5" style="text-align:left;color:var(--text3);font-size:12px;">${inn.extras.wide+inn.extras.nb} (wd:${inn.extras.wide}, nb:${inn.extras.nb})</td>`;
  bt.appendChild(ext);

  // Bowling table
  const bwt=document.getElementById('bowlTable');
  bwt.innerHTML='';
  Object.entries(inn.bowlers).forEach(([name,b])=>{
    const total=b.overs*6+b.balls;
    const eco=total?((b.runs/total)*6).toFixed(2):'0.00';
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${name}</td><td>${b.overs}.${b.balls}</td><td>0</td><td>${b.runs}</td><td>${b.wickets}</td><td>${eco}</td>`;
    bwt.appendChild(tr);
  });

  // Over history
  const oh=document.getElementById('overHistory');
  oh.innerHTML='';
  inn.overHistory.forEach((over,i)=>{
    const runs=over.reduce((a,b)=>a+(b.label==='Wd'||b.label==='Nb'?1:b.label==='•'?0:isNaN(b.label)?0:parseInt(b.label)),0);
    const d=document.createElement('div');
    d.className='over-hist-item';
    const balls=document.createElement('div');
    balls.className='over-hist-balls';
    over.forEach(ball=>{
      const b=document.createElement('div');
      b.className='ball'+(ball.cls?' '+ball.cls:'');
      b.textContent=ball.label;
      balls.appendChild(b);
    });
    const total=document.createElement('div');
    total.className='over-hist-total';
    total.textContent=`${runs} runs`;
    balls.appendChild(total);
    d.innerHTML=`<div class="over-hist-label">Over ${i+1}</div>`;
    d.appendChild(balls);
    oh.appendChild(d);
  });
}
renderSetupPlayers();
</script>
</body>
</html>
